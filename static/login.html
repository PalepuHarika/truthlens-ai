<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruthLens AI | Hallucination Detection</title>
    <meta name="description"
        content="TruthLens AI detects hallucinations in LLM outputs using NLI, HHEM, and semantic consistency scoring.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=10">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* High-Priority Theme Overrides */
        body {
            background: linear-gradient(135deg, #ffffff 0%, #f3f6fc 50%, #faf5ff 100%) !important;
            background-attachment: fixed !important;
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #0f172a 0%, #0c1527 50%, #171026 100%) !important;
            background-attachment: fixed !important;
            color: #f1f5f9 !important;
        }

        .view {
            background: transparent !important;
        }

        [data-theme="dark"] .view {
            background: transparent !important;
        }

        [data-theme="dark"] .settings-card,
        [data-theme="dark"] .panel-card {
            background: #1e293b !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
            color: #f1f5f9 !important;
        }

        [data-theme="dark"] .navbar {
            background: rgba(15, 23, 42, 0.9) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        [data-theme="dark"] .nav-link,
        [data-theme="dark"] .page-title,
        [data-theme="dark"] .sn {
            color: #f1f5f9 !important;
        }

        /* Form Inputs Color Corrections */
        .form-input {
            color: #1e293b !important;
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            border-radius: 6px;
            padding: 0.6rem 0.8rem;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-input:focus {
            background-color: #ffffff !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15) !important;
        }
        .form-input option {
            color: #1e293b !important;
            background-color: #ffffff !important;
        }
        .form-input::placeholder {
            color: #64748b !important;
            opacity: 0.8;
        }

        /* Dark Theme overrides for Contact Form */
        [data-theme="dark"] .contact-form-container {
            background: #1e293b !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
        }
        [data-theme="dark"] .form-input {
            color: #f1f5f9 !important;
            background-color: #0f172a !important;
            border-color: rgba(255, 255, 255, 0.15) !important;
        }
        [data-theme="dark"] .form-input:focus {
            background-color: #0f172a !important;
            color: #f1f5f9 !important;
        }
        [data-theme="dark"] .form-input option {
            color: #f1f5f9 !important;
            background-color: #0f172a !important;
        }



        /* Smooth Transition */
        body {
            transition: background 0.3s ease, color 0.3s ease;
        }
    </style>
    <script>
        function setTheme(theme) {
            console.log('Force applying theme:', theme);
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('truthlens_theme', theme);

            // Sync with existing buttons if they exist
            const lightBtn = document.getElementById('theme-light-btn');
            const darkBtn = document.getElementById('theme-dark-btn');
            if (lightBtn && darkBtn) {
                if (theme === 'dark') {
                    darkBtn.classList.add('active');
                    lightBtn.classList.remove('active');
                } else {
                    lightBtn.classList.add('active');
                    darkBtn.classList.remove('active');
                }
            }
        }
        // Early load to prevent flicker
        const saved = localStorage.getItem('truthlens_theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);

        // --- Chat File Logic ---
        function triggerChatUpload() {
            console.log('Triggering chat upload...');
            document.getElementById('chat-file-input')?.click();
        }

        async function handleChatFileSelect(input) {
            const file = input.files[0];
            if (!file) return;

            console.log('File selected:', file.name);
            // We call the global app.js logic via a custom event or direct call
            if (window.truthLens_handleFileUpload) {
                window.truthLens_handleFileUpload(file);
            } else {
                console.error('App logic not loaded yet');
            }
        }
    </script>
</head>

<body>
    <div class="background-blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-brain"></i>
            <span>TruthLens <strong>AI</strong></span>
        </div>
                <div class="nav-links">
            <a href="/" class="nav-link" data-view="home">Home</a>
            <a href="/dashboard" class="nav-link" data-view="dashboard">Dashboard</a>
            <a href="/chat" class="nav-link" data-view="chat">Chat</a>
            <a href="/analysis" class="nav-link" data-view="analysis">Analysis</a>
            <a href="/features" class="nav-link" data-view="features">Features</a>
            <a href="/contact" class="nav-link" data-view="contact">Contact</a>
            <a href="/settings" class="nav-link" data-view="settings">Settings</a>
            <a href="/login" class="nav-link active" data-view="login" id="nav-login-btn">Login</a>
            </div>
        <button class="btn-primary btn-sm" id="new-analysis-btn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> New Analysis
        </button>
    </nav>

    
<div id="view-login" class="view active-view">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <i class="fa-solid fa-shield-halved text-purple"
                        style="font-size: 2.5rem; margin-bottom: 1rem;"></i>
                    <h2 id="login-title">Welcome Back</h2>
                    <p id="login-subtitle">Sign in to access TruthLens Dashboard</p>
                </div>
                <form id="auth-form">
                    <div class="db-field hidden" id="auth-name-field">
                        <label class="field-label">Full Name</label>
                        <input type="text" id="auth-name" placeholder="John Doe" />
                    </div>
                    <div class="db-field">
                        <label class="field-label">Email</label>
                        <input type="email" id="auth-email" required placeholder="name@example.com" />
                    </div>
                    <div class="db-field">
                        <label class="field-label">Password</label>
                        <input type="password" id="auth-password" required placeholder="••••••••" />
                    </div>
                    <div id="auth-error" class="hidden"
                        style="color: #ef4444; font-size: 0.85rem; margin-bottom: 1rem; text-align: center; background: #fef2f2; border: 1px solid #fecaca; padding: 0.5rem; border-radius: 6px;">
                    </div>
                    <button type="submit" class="btn-primary" id="auth-submit-btn"
                        style="width: 100%; justify-content: center;">Sign In</button>
                </form>
                <div class="login-footer"
                    style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: #64748b;">
                    <p id="auth-toggle-text">Don't have an account? <a href="#" id="auth-toggle-link"
                            style="color: #4f46e5; font-weight: 600; text-decoration: none;">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
<!-- Interactive Hover Tooltip -->
    <div id="truthlens-tooltip" class="tl-tooltip hidden">
        <div class="tl-tooltip-header">
            <span id="tt-type">Claim Type</span>
            <span id="tt-status" class="tt-status-pill">Status</span>
        </div>
        <div class="tl-tooltip-meta">
            <i class="fa-solid fa-bullseye"></i> Confidence: <span id="tt-conf">0%</span>
        </div>
        <div class="tl-tooltip-reason" id="tt-reason">
            Reason details will appear here.
        </div>
    </div>

    <script src="/static/app.js?v=11"></script>
</body>

</html>
